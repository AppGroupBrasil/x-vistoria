services:
  db:
    image: postgres:16-alpine
    container_name: xvistoria-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xvistoria
      POSTGRES_USER: xvistoria
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xvistoria -d xvistoria"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xvistoria-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: xvistoria-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: xvistoria-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://xvistoria:${DB_PASSWORD}@db:5432/xvistoria
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_SMTP_USER: ${GOOGLE_SMTP_USER:-}
      GOOGLE_SMTP_APP_PASSWORD: ${GOOGLE_SMTP_APP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      PASSWORD_RESET_URL_BASE: ${PASSWORD_RESET_URL_BASE:-}
      HETZNER_S3_ENDPOINT: ${HETZNER_S3_ENDPOINT}
      HETZNER_S3_ACCESS_KEY: ${HETZNER_S3_ACCESS_KEY}
      HETZNER_S3_SECRET_KEY: ${HETZNER_S3_SECRET_KEY}
      HETZNER_S3_BUCKET: ${HETZNER_S3_BUCKET}
      FRONTEND_URL: https://xvistoria.com.br
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.xvistoria-api.rule=Host(`api.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-api.entrypoints=https"
      - "traefik.http.routers.xvistoria-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.xvistoria-api.loadbalancer.server.port=3000"
      # Redirect HTTP -> HTTPS
      - "traefik.http.routers.xvistoria-api-http.rule=Host(`api.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-api-http.entrypoints=http"
      - "traefik.http.routers.xvistoria-api-http.middlewares=redirect-to-https"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: xvistoria-web:latest
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: https://api.xvistoria.com.br
        VITE_WS_URL: wss://api.xvistoria.com.br
        VITE_PWA_URL: https://app.xvistoria.com.br
    container_name: xvistoria-web
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # Main domain — landing page + admin panel
      - "traefik.http.routers.xvistoria-web.rule=Host(`xvistoria.com.br`) || Host(`www.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-web.entrypoints=https"
      - "traefik.http.routers.xvistoria-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.xvistoria-web.loadbalancer.server.port=80"
      # Redirect www to apex
      - "traefik.http.middlewares.xvistoria-www-redirect.redirectregex.regex=^https://www\\.xvistoria\\.com\\.br/(.*)"
      - "traefik.http.middlewares.xvistoria-www-redirect.redirectregex.replacement=https://xvistoria.com.br/$${1}"
      - "traefik.http.middlewares.xvistoria-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.xvistoria-web.middlewares=xvistoria-www-redirect"
      # Sindico portal (same server)
      - "traefik.http.routers.xvistoria-sindico.rule=Host(`sindico.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-sindico.entrypoints=https"
      - "traefik.http.routers.xvistoria-sindico.tls.certresolver=letsencrypt"
      # Legacy admin subdomain redirect
      - "traefik.http.routers.xvistoria-admin-legacy.rule=Host(`admin.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-admin-legacy.entrypoints=https"
      - "traefik.http.routers.xvistoria-admin-legacy.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.xvistoria-admin-redirect.redirectregex.regex=^https://admin\\.xvistoria\\.com\\.br/(.*)"
      - "traefik.http.middlewares.xvistoria-admin-redirect.redirectregex.replacement=https://xvistoria.com.br/$${1}"
      - "traefik.http.middlewares.xvistoria-admin-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.xvistoria-admin-legacy.middlewares=xvistoria-admin-redirect"
      # HTTP redirects
      - "traefik.http.routers.xvistoria-web-http.rule=Host(`xvistoria.com.br`) || Host(`www.xvistoria.com.br`) || Host(`admin.xvistoria.com.br`) || Host(`sindico.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-web-http.entrypoints=http"
      - "traefik.http.routers.xvistoria-web-http.middlewares=redirect-to-https"

  pwa:
    image: xvistoria-pwa:latest
    build:
      context: ./pwa
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://api.xvistoria.com.br
        VITE_WS_URL: wss://api.xvistoria.com.br
    container_name: xvistoria-pwa
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.xvistoria-pwa.rule=Host(`app.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-pwa.entrypoints=https"
      - "traefik.http.routers.xvistoria-pwa.tls.certresolver=letsencrypt"
      - "traefik.http.services.xvistoria-pwa.loadbalancer.server.port=80"
      - "traefik.http.routers.xvistoria-pwa-http.rule=Host(`app.xvistoria.com.br`)"
      - "traefik.http.routers.xvistoria-pwa-http.entrypoints=http"
      - "traefik.http.routers.xvistoria-pwa-http.middlewares=redirect-to-https"

volumes:
  db_data:
  redis_data:

networks:
  coolify:
    external: true
