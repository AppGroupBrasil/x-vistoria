services:
  db:
    image: postgres:16-alpine
    container_name: xvistoria-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appvistoria
      POSTGRES_USER: xvistoria
      POSTGRES_PASSWORD: local123
    volumes:
      - db_local_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xvistoria -d appvistoria"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xvistoria-local-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: xvistoria-local-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_local_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    container_name: xvistoria-local-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/xvistoria-fotos;
      mc anonymous set public local/xvistoria-fotos;
      exit 0;
      "

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: xvistoria-local-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://xvistoria:local123@db:5432/appvistoria
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret-2026-xvistoria-safe32
      JWT_EXPIRES_IN: 7d
      OPENAI_API_KEY: placeholder
      ANTHROPIC_API_KEY: placeholder
      GOOGLE_SMTP_USER: ${GOOGLE_SMTP_USER:-}
      GOOGLE_SMTP_APP_PASSWORD: ${GOOGLE_SMTP_APP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      PASSWORD_RESET_URL_BASE: http://localhost:3001
      HETZNER_S3_ENDPOINT: http://minio:9000
      HETZNER_S3_ACCESS_KEY: minioadmin
      HETZNER_S3_SECRET_KEY: minioadmin
      HETZNER_S3_BUCKET: xvistoria-fotos
      HETZNER_S3_PUBLIC_URL: http://localhost:9000
      FRONTEND_URL: http://localhost:3001
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_WS_URL: ws://localhost:3000
        VITE_PWA_URL: http://localhost:3002
    container_name: xvistoria-local-web
    restart: unless-stopped
    ports:
      - "3001:80"

  pwa:
    build:
      context: ./pwa
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_WS_URL: ws://localhost:3000
    container_name: xvistoria-local-pwa
    restart: unless-stopped
    ports:
      - "3002:80"

volumes:
  db_local_data:
  minio_local_data:
