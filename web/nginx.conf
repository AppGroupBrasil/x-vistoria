server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Landing page (home) — static HTML
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Contract page — static HTML
    location = /contrato {
        try_files /contrato.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SEO files
    location = /robots.txt {
        access_log off;
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        access_log off;
        add_header Content-Type application/xml;
    }

    location = /sitemap-site.xml {
        access_log off;
        add_header Content-Type application/xml;
    }

    # Cache static assets (hashed by Vite + site assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to the API container
    location /api/v1/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 20m;
    }

    # SPA fallback — all app routes (/login, /dashboard, etc.)
    location / {
        try_files $uri $uri/ /app.html;
    }

    # No-cache for SPA entry point
    location = /app.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
