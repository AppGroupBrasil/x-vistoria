name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_PATH: /opt/xvistoria

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest on server
        run: |
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && git fetch origin main && git reset --hard origin/main"

      - name: Build and restart
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ env.APP_PATH }} && docker compose up -d --build --remove-orphans"

      - name: Health check
        run: |
          sleep 10
          ssh -o ServerAliveInterval=30 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=xvistoria --format '{{.Names}}: {{.Status}}'"
